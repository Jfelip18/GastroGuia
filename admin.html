<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Restaurantes</title>
    <link rel="stylesheet" href="assets/estilos.css">
</head>
<body>
    <header class="main-header">
        <nav class="nav-menu">
            <div class="nav-container">
                <div class="logo">
                    <a href="index.html">
                        <img src="img/sopa.png" alt="GastroGuia Logo">
                    </a>
                </div>
                <div class="nav-items">
                    <a href="index.html" class="nav-btn">Inicio</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="admin-container">
        <h1>Panel de Administración de Restaurantes</h1>
        
        <!-- Formulario para agregar/editar restaurante -->
        <section class="crud-form">
            <h2>Agregar/Editar Restaurante</h2>
            <form id="restaurant-form">
                <input type="hidden" id="restaurant-id">
                <div class="form-group">
                    <label for="nombre">Nombre del Restaurante:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="direccion">Dirección:</label>
                    <input type="text" id="direccion" name="direccion" required>
                </div>
                
                <div class="form-group">
                    <label for="zona">Zona:</label>
                    <input type="text" id="zona" name="zona" required>
                </div>
                
                <div class="form-group">
                    <label for="tipo">Tipo de Restaurante:</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Selecciona un tipo</option>
                        <option value="Comida Rápida">Comida Rápida</option>
                        <option value="Restaurante">Restaurante</option>
                        <option value="Café">Café</option>
                        <option value="Bar">Bar</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="precio_min">Precio Mínimo:</label>
                    <input type="number" id="precio_min" name="precio_min" min="0" required>
                </div>

                <div class="form-group">
                    <label for="precio_max">Precio Máximo:</label>
                    <input type="number" id="precio_max" name="precio_max" min="0" required>
                </div>

                <div class="form-group">
                    <label for="plato_economico">Plato Económico:</label>
                    <input type="text" id="plato_economico" name="plato_economico" required>
                </div>

                <div class="form-group">
                    <label for="plato_caro">Plato más Caro:</label>
                    <input type="text" id="plato_caro" name="plato_caro" required>
                </div>

                <div class="form-group">
                    <label for="url">URL del Restaurante:</label>
                    <input type="url" id="url" name="url" placeholder="https://ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="calificacion">Calificación:</label>
                    <select id="calificacion" name="calificacion" required>
                        <option value="">Selecciona una calificación</option>
                        <option value="1.0">⭐ 1.0</option>
                        <option value="1.5">⭐ 1.5</option>
                        <option value="2.0">⭐⭐ 2.0</option>
                        <option value="2.5">⭐⭐ 2.5</option>
                        <option value="3.0">⭐⭐⭐ 3.0</option>
                        <option value="3.5">⭐⭐⭐ 3.5</option>
                        <option value="4.0">⭐⭐⭐⭐ 4.0</option>
                        <option value="4.5">⭐⭐⭐⭐ 4.5</option>
                        <option value="5.0">⭐⭐⭐⭐⭐ 5.0</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Características:</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="caracteristicas" value="WiFi"> WiFi
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="caracteristicas" value="Estacionamiento"> Estacionamiento
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="caracteristicas" value="Delivery"> Delivery
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="caracteristicas" value="Reservas"> Reservas
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="caracteristicas" value="Música en vivo"> Música en vivo
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="caracteristicas" value="Accesible"> Accesible
                        </label>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="admin-btn save-btn">Guardar</button>
                    <button type="button" class="admin-btn cancel-btn" onclick="clearForm()">Cancelar</button>
                </div>
            </form>
        </section>

        <!-- Tabla de restaurantes -->
        <section class="restaurants-table">
            <h2>Lista de Restaurantes</h2>
            <div class="table-container">
                <table id="restaurants-list">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Zona</th>
                            <th>Rango de Precios</th>
                            <th>Dirección</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Los restaurantes se cargarán dinámicamente aquí -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2023 GastroGuia. Todos los derechos reservados.</p>
    </footer>

    <script src="assets/admin.js"></script>
</body>
</html>
