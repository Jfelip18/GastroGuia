<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iniciar sesion</title>
    <link rel="stylesheet" href="assets/logres.css">
</head>

<body>
    <nav class="nav-menu">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="img/sopa.png" alt="GastroGuia Logo">
                </a>
            </div>
            <div class="nav-items">
                <a href="index.html" class="nav-btn">Inicio</a>
                <a href="registro.html" class="nav-btn">Registrarse</a>
            </div>
        </div>
    </nav>
    <div class="titulo">
        <h2>Iniciar Sesión</h2>
    </div>
    <div class="container">
        <div id="error-message" class="error-message" style="display: none;"></div>
        <form id="loginForm">

            <label for="username">Nombre de Usuario o Email:</label>
            <input type="text" id="username" name="username" required placeholder="Ingrese su usuario o email">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">

            <button type="submit" class="boton">Iniciar Sesión</button>
        </form>
        <p class="register-link">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </div>
    <script src="assets/acceso.js"></script>
</body>

</html>
