<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="assets/logres.css">
</head>
<body>
    <nav class="nav-menu">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="img/sopa.png" alt="GastroGuia Logo">
                </a>
            </div>
            <div class="nav-items">
                <a href="index.html" class="nav-btn">Inicio</a>
                <a href="login.html" class="nav-btn">Iniciar Sesión</a>
            </div>
        </div>
    </nav>
    <h1 class="titulo">Registrate</h1>
    <div class="container">
        <div id="error-message" class="error-message" style="display: none;"></div>
        <form id="registerForm">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre completo">
            
            <label for="username">Usuario: *</label>
            <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>

            <label for="email">Correo Electrónico: *</label>
            <input type="email" id="email" name="email" placeholder="Ingrese su correo electrónico" required>

            <label for="password">Contraseña: *</label>
            <input type="password" id="password" name="password" placeholder="Ingrese su contraseña (mínimo 6 caracteres)" required>

            <label for="confirm-password">Confirmar Contraseña: *</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirme su contraseña" required>

            <button type="submit" class="boton">Registrarse</button>
        </form>
        <p class="register-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
    </div>
    <script src="assets/acceso.js"></script>
</body>
</html>
